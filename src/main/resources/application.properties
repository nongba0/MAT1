spring.application.name=matchmaker

# ==========================================
# Supabase (PostgreSQL) Database Settings
# ==========================================
# 접속 정보는 코드에 박지 않습니다. 환경 변수로 주입하고, 없으면 콜론(:) 뒤 기본값을 사용합니다.
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres.dtsodmejqngafwdgcezm}
# 비밀번호는 절대 커밋하지 않습니다. 실행 환경의 DB_PASSWORD 환경 변수로만 주입하세요.
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA/Hibernate Settings
# ==========================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Batch Fetching (N+1 Query Optimization)
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Static Resource Caching (1 Hour)
spring.web.resources.cache.period=3600

